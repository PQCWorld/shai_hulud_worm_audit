name: IOC refresh
on:
  schedule:
    - cron: "17 6 * * 1"  # Mondays 06:17 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[update]"
      - run: shai-hulud-audit --update --ioc-dir shai_hulud_audit/ioc/data
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(ioc): weekly refresh"
          title: "IOC refresh ${{ github.run_id }}"
          body: |
            Automated IOC list refresh.

            Diff reflects changes pulled from upstream feeds listed in
            `shai_hulud_audit/ioc/data/manifest.json`.
          branch: ioc/auto-refresh
          delete-branch: true
